name: Build Apps

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        python-version: ["3.9", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m unittest discover -s tests
      - run: python -m py_compile ccscience_sync.py

  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Create release if needed
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
              --title "ccscience-sync $TAG" \
              --notes "Desktop app release with one-click install."

  build:
    needs: [test, create-release]
    if: >-
      always() &&
      needs.test.result == 'success' &&
      (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: ccscience-sync-macos.zip
          - os: windows-latest
            artifact: ccscience-sync-windows.zip
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build macOS app
        if: runner.os == 'macOS'
        run: |
          pyinstaller --noconfirm --clean --windowed --name ccscience-sync ccscience_sync.py
          codesign --force --deep --sign - dist/ccscience-sync.app
          ditto -c -k --keepParent dist/ccscience-sync.app "dist/${{ matrix.artifact }}"

      - name: Build Windows app
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name ccscience-sync ccscience_sync.py
          Compress-Archive -Path dist\ccscience-sync.exe -DestinationPath "dist\${{ matrix.artifact }}" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: gh release upload "$TAG" "dist/${{ matrix.artifact }}" --repo "$GITHUB_REPOSITORY" --clobber
